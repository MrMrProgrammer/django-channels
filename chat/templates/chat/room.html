{% load static %}

<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Realtime Chat</title>

    <link rel="icon" href="data:,">

    <link rel="stylesheet" href="{% static 'chat/css/bootstrap.min.css' %}">
    <script src="{% static 'chat/js/reconnecting-websocket.js' %}"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0f172a;
            font-family: Vazirmatn, sans-serif;
            height:100vh;
            overflow:hidden;
        }

        .chat-container{
            width:100%;
            max-width:1100px;
            height:95vh;
            margin:20px auto;
            background:#111827;
            border-radius:24px;
            overflow:hidden;
            display:flex;
            flex-direction:column;
            box-shadow:0 10px 40px rgba(0,0,0,.35);
        }

        .chat-header{
            height:80px;
            background:#1e293b;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 24px;
            border-bottom:1px solid rgba(255,255,255,.05);
        }

        .chat-user{
            display:flex;
            align-items:center;
            gap:14px;
        }

        .avatar{
            width:48px;
            height:48px;
            border-radius:50%;
            background:linear-gradient(135deg,#3b82f6,#8b5cf6);
            display:flex;
            align-items:center;
            justify-content:center;
            color:#fff;
            font-weight:bold;
            font-size:18px;
        }

        .chat-user-info h3{
            color:#fff;
            font-size:18px;
            margin-bottom:3px;
        }

        .chat-user-info span{
            color:#94a3b8;
            font-size:13px;
        }

        .messages{
            flex:1;
            padding:24px;
            overflow-y:auto;
            background:#0f172a;
        }

        .messages ul{
            list-style:none;
        }

        .message{
            width:100%;
            display:flex;
            margin-bottom:18px;
        }

        .message.sent{
            justify-content:flex-end;
        }

        .message.received{
            justify-content:flex-start;
        }

        .message .bubble{
            max-width:75%;
            padding:14px 18px;
            border-radius:18px;
            color:#fff;
            line-height:1.7;
            font-size:15px;
            word-break:break-word;
        }

        .message.sent .bubble{
            background:linear-gradient(135deg,#2563eb,#7c3aed);
            border-bottom-right-radius:6px;
        }

        .message.received .bubble{
            background:#1e293b;
            border-bottom-left-radius:6px;
        }

        .chat-input{
            min-height:85px;
            background:#111827;
            border-top:1px solid rgba(255,255,255,.05);
            display:flex;
            align-items:center;
            gap:14px;
            padding:16px;
        }

        .chat-input input{
            flex:1;
            height:55px;
            border:none;
            outline:none;
            background:#1e293b;
            border-radius:16px;
            padding:0 20px;
            color:#fff;
            font-size:15px;
        }

        .chat-input input::placeholder{
            color:#94a3b8;
        }

        .send-btn,
        .attach-btn{
            width:55px;
            height:55px;
            border:none;
            border-radius:16px;
            cursor:pointer;
            transition:.2s;
            color:#fff;
            font-size:20px;
        }

        .send-btn{
            background:linear-gradient(135deg,#2563eb,#7c3aed);
        }

        .attach-btn{
            background:#1e293b;
        }

        .send-btn:hover,
        .attach-btn:hover{
            transform:scale(1.05);
        }

        .messages::-webkit-scrollbar{
            width:6px;
        }

        .messages::-webkit-scrollbar-thumb{
            background:#334155;
            border-radius:20px;
        }

        @media(max-width:768px){

            .chat-container{
                height:100vh;
                border-radius:0;
                margin:0;
            }

            .message .bubble{
                max-width:90%;
            }
        }
        .rotate {
          transform: rotate(180deg);
        }


    </style>

</head>

<body>

<div class="chat-container">

    <!-- Header -->
    <div class="chat-header">

        <div class="chat-user">

            <div class="avatar">
                {{ username|first|upper }}
            </div>

            <div class="chat-user-info">
                <h3>{{ username }}</h3>
                <span>Online</span>
            </div>

        </div>

    </div>

    <!-- Messages -->
    <div class="messages">
        <ul id="chat-log"></ul>
    </div>

    <!-- Input -->
    <div class="chat-input">
        <input
                id="chat-message-input"
                type="text"
                placeholder="پیام خود را بنویسید..."
        >

        <button id="chat-message-submit" class="send-btn rotate">
            ➤
        </button>

    </div>

</div>

<input id="inp" type="file" hidden>

<!-- SAFE DJANGO JSON -->
{{ room_name|json_script:"room-name" }}

<script>

    // SAFE VARIABLES
    const username = {{ username }}

    const roomName = JSON.parse(
        document.getElementById('room-name').textContent
    );

    // WEBSOCKET
    const chatSocket = new ReconnectingWebSocket(
        (window.location.protocol === 'https:' ? 'wss://' : 'ws://')
        + window.location.host
        + '/ws/chat/'
        + roomName
        + '/'
    );

    const chatSocket2 = new WebSocket(
        (window.location.protocol === 'https:' ? 'wss://' : 'ws://')
        + window.location.host
        + '/ws/chat/'
        + 'listener'
        + '/'
    );

    chatSocket2.onmessage = function (e) {
        const data = JSON.parse(e.data);

        if (!data || !data.members || !data["__str__"] || !data.room_name || !data.content) {
            console.warn("Received incomplete data for notification:", data);
            return;
        }

        if (!data.members.includes(username)) return;
        if (data["__str__"] === username) return;
        if (data.room_name === roomName) return;
        if (!("Notification" in window)) {
            alert("این مرورگر از نوتیفیکیشن‌های دسکتاپ پشتیبانی نمی‌کند.");
        } else if (Notification.permission === "granted") {
            var notification = new Notification(`${data["__str__"]}: ${data.content}`);
            console.log("Notification displayed");
        } else if (Notification.permission !== "denied") {
            Notification.requestPermission().then(function (permission) {
                if (permission === "granted") {
                    var notification = new Notification("Hi there!");
                    console.log("Notification permission granted and displayed");
                }
            });
        }
        console.log("it is working (notification sent)");
    };



    // LOAD OLD MESSAGES
    chatSocket.onopen = function () {

        chatSocket.send(JSON.stringify({
            room_name: roomName,
            command: "fetch_message"
        }));

    };

    // RECEIVE MESSAGE
    chatSocket.onmessage = function (e) {
        const data = JSON.parse(e.data);
        if (data.command === 'fetch_message') {
            for (let i = data.message.length - 1; i >= 0; i--) {
                createMessage(data.message[i]);
            }
        } else {
            createMessage(data);
        }
    };

    chatSocket.onclose = function () {
        console.error('Socket closed unexpectedly');
    };

    // ENTER KEY
    document
        .querySelector('#chat-message-input')
        .addEventListener('keyup', function (e) {

            if (e.key === 'Enter') {
                document.querySelector('#chat-message-submit').click();
            }

        });

    // SEND MESSAGE
    document
        .querySelector('#chat-message-submit')
        .onclick = function () {

            const input = document.querySelector('#chat-message-input');

            const message = input.value.trim();

            if (!message) return;

            chatSocket.send(JSON.stringify({
                message: message,
                command: 'new_message',
                username: username,
                room_name: roomName,
            }));

            input.value = '';

        };

    // CREATE MESSAGE
    function createMessage(data) {
        const author = data["__str__"];
        const li = document.createElement('li');
        li.classList.add('message');
        const bubble = document.createElement('div');
        bubble.classList.add('bubble');
        bubble.textContent = data.content;

        if (author === username) {
            li.classList.add('sent');
        } else {
            li.classList.add('received');
        }

        li.appendChild(bubble);

        document
            .querySelector('#chat-log')
            .appendChild(li);

        // AUTO SCROLL
        const messages = document.querySelector('.messages');

        messages.scrollTop = messages.scrollHeight;

    }

</script>

</body>
</html>
